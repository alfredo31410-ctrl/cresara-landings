<!doctype html>
<html lang="es">
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>Gracias | Cressara</title>
    <meta
      name="description"
      content="Gracias por registrarte al curso gratis online de Cressara."
    >
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link
      href="https://fonts.googleapis.com/css2?family=Montserrat:wght@500;600;700;800;900&display=swap"
      rel="stylesheet"
    >
    <link rel="stylesheet" href="styles.css">
  </head>
  <body>
    <main class="landing">
      <img class="desktop-art" src="assets/cresara-hero-base.png" alt="">

      <section class="hero hero--thanks" aria-labelledby="thanks-title">
        <div class="brand" aria-label="Cressara">
          <span class="brand__mark" aria-hidden="true"></span>
          <span class="brand__name">Cressara</span>
          <span class="brand__tagline">Transforma - Sana - Crece</span>
        </div>

        <div class="mobile-portrait" aria-hidden="true">
          <img src="assets/miriam-sola.png" alt="">
        </div>

        <div class="content thanks-copy">
          <div class="eyebrow">Registro confirmado</div>
          <h1 id="thanks-title">
            Gracias por registrarte.
            <span>Tu lugar está reservado.</span>
          </h1>

          <div class="event-meta">
            <strong>3 de junio 10:00 AM</strong>
            <span>(Hora CDMX)</span>
          </div>

          <p class="teacher">
            Te enviaremos por correo y WhatsApp los datos de acceso al curso.
          </p>

          <a class="whatsapp-button" href="index.html">Volver al inicio</a>
        </div>
      </section>
    </main>
  </body>
</html>
