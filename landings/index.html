<!doctype html>
<html lang="es">
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>Cressara | Curso gratis online</title>
    <meta
      name="description"
      content="Curso gratis online de Cressara: En que momento empezaste a desaparecer para sostener a todos."
    >
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link
      href="https://fonts.googleapis.com/css2?family=Montserrat:wght@500;600;700;800;900&display=swap"
      rel="stylesheet"
    >
    <link rel="stylesheet" href="styles.css">
  </head>
  <body>
    <main class="landing">
      <img class="desktop-art" src="assets/cresara-hero-base.png" alt="">

      <section class="hero hero--signup" aria-labelledby="landing-title">
        <div class="brand" aria-label="Cressara">
          <span class="brand__mark" aria-hidden="true"></span>
          <span class="brand__name">Cressara</span>
          <span class="brand__tagline">Transforma - Sana - Crece</span>
        </div>

        <div class="mobile-portrait" aria-hidden="true">
          <img src="assets/miriam-sola.png" alt="">
        </div>

        <a class="register-shortcut" href="#registro">
          <span>Regístrate</span>
          <strong>Aquí</strong>
        </a>

        <div class="content">
          <div class="eyebrow">Curso gratis online</div>

          <h1 id="landing-title">
            ¿En qué momento empezaste a desaparecer para sostener
            <span>a todos?</span>
          </h1>

          <div class="event-meta">
            <strong>3 de junio 10:00 AM</strong>
            <span>(Hora CDMX)</span>
          </div>

          <p class="teacher">
            Impartido por la psicóloga:
            <strong>Miriam Guadalupe Márquez Ordaz.</strong>
          </p>

          <form id="registro" class="signup-form" action="gracias.html" method="get">
            <label>
              <span>Nombre</span>
              <input name="nombre" type="text" autocomplete="name" required>
            </label>
            <label>
              <span>Correo</span>
              <input name="email" type="email" autocomplete="email" required>
            </label>
            <label>
              <span>WhatsApp</span>
              <input name="telefono" type="tel" autocomplete="tel" required>
            </label>
            <button type="submit">Reservar mi lugar</button>
          </form>
        </div>
      </section>
    </main>
  </body>
</html>
